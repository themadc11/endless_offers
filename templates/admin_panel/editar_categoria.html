{% extends "admin_panel/base_admin.html" %}
{% load static %}

{% block admin_title %}Editar Categoría{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-0">
            <div class="card-header bg-white p-4 border-0">
                <h5 class="fw-bold mb-0">
                    <i class="bi bi-pencil me-2" style="color: var(--primary);"></i>
                    Editar Categoría: {{ categoria.nombre }}
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Nombre de la categoría</label>
                        <input type="text" name="nombre" class="form-control rounded-0" value="{{ categoria.nombre }}" required>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'admin_categorias' %}" class="btn btn-outline-dark rounded-0">Cancelar</a>
                        <button type="submit" class="btn" style="background-color: var(--primary); color: white; border-radius: 0;">
                            <i class="bi bi-save me-2"></i> Guardar cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
